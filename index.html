<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Nijai | AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg:#0f172a;
  --card:rgba(255,255,255,0.05);
  --text:#e5e7eb;
  --accent:#6366f1;
}

body {
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* HERO */
.hero {
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#1e293b,#0f172a);
}

.hero img {
  width:120px;
  border-radius:50%;
  border:3px solid var(--accent);
}

.hero h1 {
  font-size:42px;
  margin:15px 0;
}

#typing {
  color:var(--accent);
}

/* CONTAINER */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card {
  background:var(--card);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

/* CHAT BUTTON */
#chatButton {
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  padding:14px;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* CHAT POPUP */
#chatPopup {
  position:fixed;
  bottom:20px;
  right:20px;
  width:360px;
  height:560px;
  background:white;
  border-radius:20px;
  display:none;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
#chatHeader {
  padding:12px;
  background:#6366f1;
  color:white;
  flex-shrink:0;
}

/* GREETING OVERLAY */
#greeting {
  position:absolute;
  top:50px;
  left:0;
  right:0;
  padding:15px;
  font-size:14px;
  background:#88c0f7;
  border-bottom:1px solid #ddd;
  z-index:10;
  animation:fadeIn 0.3s ease;
}

/* TYPING DOTS */
.dots::after {
  content:"...";
  animation:dots 1.5s infinite;
}

@keyframes dots {
  0%{content:".";}
  33%{content:"..";}
  66%{content:"...";}
}

/* CHAT BODY */
#chatBody {
  flex:1;
  display:flex;
}

#chatBody iframe {
  width:100%;
  height:100%;
  border:none;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="profile.jpg">
  <h1>Love Nijai</h1>
  <p id="typing"></p>
</div>

<div class="container">
  <div class="card">
    <h2>Why Hire Me</h2>
    <p>9+ years experience • Team Lead • Cloud & Banking expert</p>
  </div>
</div>

<!-- CHAT BUTTON -->
<div id="chatButton" onclick="openChat()">💬</div>

<!-- CHAT POPUP -->
<div id="chatPopup">

  <div id="chatHeader">
    Love Nijai AI 🤖
    <span onclick="closeChat()" style="float:right;cursor:pointer;">✖</span>
  </div>

  <!-- GREETING -->
  <div id="greeting">
    Hi 👋 I'm Love Nijai's Assistant <br>
    <span id="greetText">Let me help you understand his profile<span class="dots"></span></span>
  </div>

  <div id="chatBody">
    <iframe src="https://lovenijai-career-info.hf.space"></iframe>
  </div>

</div>

<script>
// HERO TYPING
const text = "Technical Team Lead | Full Stack Developer";
let i = 0;
function type(){
 if(i < text.length){
   document.getElementById("typing").innerHTML += text.charAt(i);
   i++;
   setTimeout(type,40);
 }
}
type();

// CHAT
function openChat(){
 document.getElementById("chatPopup").style.display="flex";

 // Remove greeting after few seconds
 setTimeout(()=>{
   let g = document.getElementById("greeting");
   if(g){
     g.style.display="none";
   }
 },2000);
}

function closeChat(){
 document.getElementById("chatPopup").style.display="none";
}

// CTA CHANGE
setTimeout(()=>{
 document.getElementById("chatButton").innerText="💬 Ask me why you should hire him";
},3000);
</script>

</body>
</html>
